name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - name: Smoke test — list tools
        run: node dist/index.js --list
      - name: Smoke test — help
        run: node dist/index.js --help
      - name: Smoke test — self-scan
        run: node dist/index.js --tool sast_scan_directory '{"path":"./src"}'
