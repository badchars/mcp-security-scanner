<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="icon-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Pill gradients -->
    <linearGradient id="pill-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="pill-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="pill-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="pill-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="pill-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#3b82f6" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="200" cy="140" r="120" fill="#3b82f6" opacity="0.04"/>
  <circle cx="200" cy="140" r="70" fill="#3b82f6" opacity="0.06"/>
  <circle cx="620" cy="160" r="100" fill="#06b6d4" opacity="0.04"/>
  <circle cx="620" cy="160" r="55" fill="#06b6d4" opacity="0.06"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="800" height="2" fill="url(#accent)"/>
  <!-- Bottom border accent -->
  <rect x="0" y="318" width="800" height="2" fill="url(#accent)"/>

  <!-- Shield with checkmark icon -->
  <g transform="translate(400, 80)" filter="url(#icon-glow)">
    <!-- Shield shape -->
    <path d="M0,-38 L-28,-24 L-28,4 C-28,22 -10,36 0,42 C10,36 28,22 28,4 L28,-24 Z"
          fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <!-- Inner shield fill (subtle) -->
    <path d="M0,-34 L-24,-21 L-24,3 C-24,19 -9,32 0,37 C9,32 24,19 24,3 L24,-21 Z"
          fill="#3b82f6" opacity="0.08"/>
    <!-- Magnifying glass body -->
    <circle cx="-3" cy="-6" r="11" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.8"/>
    <!-- Magnifying glass handle -->
    <line x1="5" y1="2" x2="13" y2="10" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <!-- Checkmark inside magnifier -->
    <path d="M-8,-6 L-4,-2 L3,-10" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  </g>

  <!-- Title -->
  <text x="400" y="152" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="-0.5">mcp-security-scanner</text>

  <!-- Subtitle -->
  <text x="400" y="176" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#a1a1aa" letter-spacing="0.5">MCP Server Security Scanner</text>

  <!-- Accent line -->
  <rect x="320" y="189" width="160" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Stats pills row -->
  <g transform="translate(400, 216)">
    <!-- 43 Tools (blue) -->
    <g transform="translate(-240, 0)">
      <rect x="-38" y="-12" width="76" height="24" rx="12" fill="url(#pill-blue)" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#3b82f6">43 Tools</text>
    </g>
    <!-- 6 Categories (cyan) -->
    <g transform="translate(-126, 0)">
      <rect x="-50" y="-12" width="100" height="24" rx="12" fill="url(#pill-cyan)" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#06b6d4">6 Categories</text>
    </g>
    <!-- OWASP (amber) -->
    <g transform="translate(12, 0)">
      <rect x="-56" y="-12" width="112" height="24" rx="12" fill="url(#pill-amber)" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#f59e0b">OWASP Top 10</text>
    </g>
    <!-- MCP (purple) -->
    <g transform="translate(138, 0)">
      <rect x="-28" y="-12" width="56" height="24" rx="12" fill="url(#pill-purple)" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#8b5cf6">MCP</text>
    </g>
    <!-- Security (green) -->
    <g transform="translate(228, 0)">
      <rect x="-34" y="-12" width="68" height="24" rx="12" fill="url(#pill-green)" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#22c55e">Security</text>
    </g>
  </g>

  <!-- Category names -->
  <text x="400" y="260" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="9.5" fill="#52525b" letter-spacing="0.8">Auth · Tool Poisoning · Rug Pull · Shadowing · Cross-Server · Data Exfiltration</text>

  <!-- Decorative corner dots -->
  <circle cx="20" cy="20" r="1.5" fill="#3b82f6" opacity="0.3"/>
  <circle cx="780" cy="20" r="1.5" fill="#06b6d4" opacity="0.3"/>
  <circle cx="20" cy="300" r="1.5" fill="#06b6d4" opacity="0.3"/>
  <circle cx="780" cy="300" r="1.5" fill="#3b82f6" opacity="0.3"/>
</svg>
