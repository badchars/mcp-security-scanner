name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]

body:
  - type: dropdown
    id: usage-mode
    attributes:
      label: Usage Mode
      description: How are you using mcp-security-scanner?
      options:
        - MCP Server
        - CLI
    validations:
      required: true

  - type: input
    id: tool-name
    attributes:
      label: Tool Name
      description: Which tool is affected?
      placeholder: "e.g., rt_check_tool_poisoning, sast_scan_directory, cfg_auto_discover"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run tool '...' with input '...'
        2. Observe error
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output / logs
      description: Paste any error messages or logs here.
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: "What version of mcp-security-scanner are you running? (`node dist/index.js --help`)"
      placeholder: "e.g., 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
