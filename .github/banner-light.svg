<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accent-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- Icon glow (softer for light mode) -->
    <filter id="icon-glow-light">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Pill backgrounds -->
    <linearGradient id="lpill-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="lpill-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <linearGradient id="lpill-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="lpill-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="lpill-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg-light)"/>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="799" height="319" rx="0" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Grid lines -->
  <g stroke="#2563eb" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
  </g>

  <!-- Subtle glow orbs -->
  <circle cx="200" cy="140" r="120" fill="#2563eb" opacity="0.025"/>
  <circle cx="200" cy="140" r="70" fill="#2563eb" opacity="0.03"/>
  <circle cx="620" cy="160" r="100" fill="#0891b2" opacity="0.025"/>
  <circle cx="620" cy="160" r="55" fill="#0891b2" opacity="0.03"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="800" height="2" fill="url(#accent-light)"/>
  <!-- Bottom border accent -->
  <rect x="0" y="318" width="800" height="2" fill="url(#accent-light)"/>

  <!-- Shield with checkmark icon -->
  <g transform="translate(400, 80)" filter="url(#icon-glow-light)">
    <!-- Shield shape -->
    <path d="M0,-38 L-28,-24 L-28,4 C-28,22 -10,36 0,42 C10,36 28,22 28,4 L28,-24 Z"
          fill="none" stroke="url(#accent-light)" stroke-width="2.5" opacity="0.8"/>
    <!-- Inner shield fill (subtle) -->
    <path d="M0,-34 L-24,-21 L-24,3 C-24,19 -9,32 0,37 C9,32 24,19 24,3 L24,-21 Z"
          fill="#2563eb" opacity="0.04"/>
    <!-- Magnifying glass body -->
    <circle cx="-3" cy="-6" r="11" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.7"/>
    <!-- Magnifying glass handle -->
    <line x1="5" y1="2" x2="13" y2="10" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Checkmark inside magnifier -->
    <path d="M-8,-6 L-4,-2 L3,-10" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
  </g>

  <!-- Title -->
  <text x="400" y="152" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="28" font-weight="700" fill="#1e293b" letter-spacing="-0.5">mcp-security-scanner</text>

  <!-- Subtitle -->
  <text x="400" y="176" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#64748b" letter-spacing="0.5">MCP Server Security Scanner</text>

  <!-- Accent line -->
  <rect x="320" y="189" width="160" height="2" rx="1" fill="url(#accent-light)" opacity="0.5"/>

  <!-- Stats pills row -->
  <g transform="translate(400, 216)">
    <!-- 43 Tools (blue) -->
    <g transform="translate(-240, 0)">
      <rect x="-38" y="-12" width="76" height="24" rx="12" fill="url(#lpill-blue)" stroke="#93c5fd" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#2563eb">43 Tools</text>
    </g>
    <!-- 6 Categories (cyan) -->
    <g transform="translate(-126, 0)">
      <rect x="-50" y="-12" width="100" height="24" rx="12" fill="url(#lpill-cyan)" stroke="#67e8f9" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#0891b2">6 Categories</text>
    </g>
    <!-- OWASP (amber) -->
    <g transform="translate(12, 0)">
      <rect x="-56" y="-12" width="112" height="24" rx="12" fill="url(#lpill-amber)" stroke="#fcd34d" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#d97706">OWASP Top 10</text>
    </g>
    <!-- MCP (purple) -->
    <g transform="translate(138, 0)">
      <rect x="-28" y="-12" width="56" height="24" rx="12" fill="url(#lpill-purple)" stroke="#c4b5fd" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#7c3aed">MCP</text>
    </g>
    <!-- Security (green) -->
    <g transform="translate(228, 0)">
      <rect x="-34" y="-12" width="68" height="24" rx="12" fill="url(#lpill-green)" stroke="#86efac" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#16a34a">Security</text>
    </g>
  </g>

  <!-- Category names -->
  <text x="400" y="260" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="9.5" fill="#94a3b8" letter-spacing="0.8">Auth · Tool Poisoning · Rug Pull · Shadowing · Cross-Server · Data Exfiltration</text>

  <!-- Decorative corner dots -->
  <circle cx="20" cy="20" r="1.5" fill="#2563eb" opacity="0.2"/>
  <circle cx="780" cy="20" r="1.5" fill="#0891b2" opacity="0.2"/>
  <circle cx="20" cy="300" r="1.5" fill="#0891b2" opacity="0.2"/>
  <circle cx="780" cy="300" r="1.5" fill="#2563eb" opacity="0.2"/>
</svg>
